<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="WordFlip — İngilizce kelime öğrenme uygulaması" />
  <title>WordFlip — İngilizce Öğren</title>

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="style.css" />

  <!-- Favicon emoji -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="logo">
      <div class="logo-icon">📚</div>
      <span class="logo-text">Word<span>Flip</span></span>
    </div>
    <button class="theme-toggle" id="themeToggle" title="Temayı değiştir" aria-label="Temayı değiştir">☀️</button>
  </header>

  <!-- ── Progress ── -->
  <div class="progress-container">
    <div class="progress-info">
      <span>İlerleme</span>
      <span id="progressText">1 / 25</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 4%"></div>
    </div>
  </div>

  <!-- ── Flashcard ── -->
  <div class="scene" id="scene" role="button" tabindex="0" aria-label="Kartı çevirmek için tıkla">
    <div class="card" id="card">

      <!-- FRONT: English word -->
      <div class="card__face card__front">
        <p class="card-hint">İngilizce</p>
        <h1 class="card-word" id="word">—</h1>
        <button class="speak-btn" id="speakBtn" title="Sesi dinle" aria-label="Kelimeyi sesli oku">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          Dinle
        </button>
        <span class="flip-hint">Çevirmek için tıkla</span>
      </div>

      <!-- BACK: Turkish + example -->
      <div class="card__face card__back">
        <p class="card-hint">Türkçe Anlam</p>
        <h2 class="card-turkish" id="turkish">—</h2>
        <div class="divider"></div>
        <p class="card-example" id="example">—</p>
        <span class="flip-hint">Geri çevirmek için tıkla</span>
      </div>

    </div>
  </div>

  <!-- ── Navigation ── -->
  <div class="nav-buttons">
    <button class="btn btn-secondary" id="btnPrev" aria-label="Önceki kelime">
      ← Önceki
    </button>
    <button class="btn btn-center" id="btnShuffle" title="Karıştır" aria-label="Kelimeleri karıştır">
      🔀
    </button>
    <button class="btn btn-primary" id="btnNext" aria-label="Sonraki kelime">
      Sonraki →
    </button>
  </div>

  <!-- ── All Words Grid ── -->
  <p class="section-title">Tüm Kelimeler</p>
  <div class="word-grid" id="wordGrid"></div>

  <!-- ── Keyboard hint ── -->
  <p style="margin-top:1.5rem; font-size:0.7rem; color:var(--text-muted); text-align:center; letter-spacing:0.5px;">
    ← → ok tuşları ile gezin &nbsp;·&nbsp; Boşluk ile çevir &nbsp;·&nbsp; S ile seslendir
  </p>

  <script src="app.js"></script>
</body>
</html>
